name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build and Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Compile TypeScript
        run: bun run compile

      - name: Lint
        run: bun run lint

  test:
    name: Extension Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Compile TypeScript
        run: bun run compile

      - name: Install xvfb
        run: sudo apt-get install -y xvfb

      - name: Run extension tests
        run: xvfb-run -a node ./out/test/runTest.js
        env:
          DISPLAY: ':99.0'
