name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build and Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      # Skip optional native bindings (e.g. Vite/rolldown platform packages from
      # the test-apps workspace). They are not needed to build, lint, or test the
      # extension, and their downloads are a flaky source of CI failures.
      - name: Install dependencies
        run: bun install --omit=optional

      - name: Compile TypeScript
        run: bun run compile

      - name: Lint
        run: bun run lint

  test:
    name: Extension Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      # See note in the build job: optional native bindings are unnecessary for
      # the extension test run and cause flaky install failures.
      - name: Install dependencies
        run: bun install --omit=optional

      - name: Compile TypeScript
        run: bun run compile

      - name: Install xvfb
        run: sudo apt-get install -y xvfb

      - name: Run extension tests
        run: xvfb-run -a node ./out/test/runTest.js
        env:
          DISPLAY: ':99.0'
