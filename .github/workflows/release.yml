name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release:
    name: Check version and release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.pkg.outputs.version }}" &>/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release v${{ steps.pkg.outputs.version }} already exists — skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No release for v${{ steps.pkg.outputs.version }} — will publish."
          fi

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        if: steps.check.outputs.exists == 'false'
        with:
          bun-version: latest

      - name: Install dependencies
        if: steps.check.outputs.exists == 'false'
        run: bun install

      - name: Compile and lint
        if: steps.check.outputs.exists == 'false'
        run: bun run compile && bun run lint

      - name: Package extension
        if: steps.check.outputs.exists == 'false'
        run: bun run package

      - name: Generate provenance attestation
        if: steps.check.outputs.exists == 'false'
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: '*.vsix'

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.pkg.outputs.version }}" \
            *.vsix \
            --title "v${{ steps.pkg.outputs.version }}" \
            --generate-notes

      - name: Publish to VS Marketplace
        if: steps.check.outputs.exists == 'false'
        run: |
          output=$(bunx vsce publish --no-dependencies --pat ${{ secrets.VSCE_PAT }} 2>&1)
          exit_code=$?
          echo "$output"
          if [ $exit_code -ne 0 ] && echo "$output" | grep -q "already exists"; then
            echo "Version already on marketplace — skipping."
            exit 0
          fi
          exit $exit_code
